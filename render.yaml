services:
  - type: web
    name: ecg-analyser
    runtime: node
    repo: https://github.com/YOUR_USERNAME/ecg_analyser_website
    rootDir: ecg-analyser-web
    buildCommand: cd ecg-analyser-web && npm run install:all && npm run build
    startCommand: cd ecg-analyser-web && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app-name.onrender.com
      - key: PORT
        value: 10000
