services:
  - type: web
    name: ecg-analyser
    runtime: node
    repo: https://github.com/ProSkywalker16/ecg-analyser-website
    rootDir: ecg-analyser-web
    buildCommand: npm --prefix server install && npm --prefix client install && cd client && npx vite build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app-name.onrender.com
      - key: PORT
        value: 10000
